<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EB Split Calculator</title>

<!-- jsPDF + AutoTable for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  padding: 10px;
  font-size: 14px;
  max-width: 600px;
  margin: 0 auto;
}

h2 { font-size: 18px; margin: 10px 0 6px; color: #222; }

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  border: 1px solid #ddd;
  overflow: hidden;
}

.card > b {
  font-size: 14px;
  display: block;
  margin-bottom: 6px;
  color: #111;
}

label { font-size: 13px; color: #555; margin-top: 10px; display: block; }
label:first-child { margin-top: 0; }

input[type=number] {
  width: 100%;
  padding: 10px;
  margin-top: 4px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  -webkit-appearance: none;
  appearance: none;
}

.btn-row { display: flex; gap: 8px; margin-top: 12px; }

button {
  flex: 1;
  padding: 12px;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

#calcBtn  { background: #2563eb; color: white; }
#calcBtn:active  { background: #1d4ed8; }

#dlBtn {
  background: #16a34a;
  color: white;
  display: none;
}
#dlBtn:active { background: #15803d; }

.tbl-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-top: 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 300px;
}

th, td {
  border: 1px solid #e0e0e0;
  padding: 6px 8px;
  text-align: center;
  white-space: nowrap;
}

th { background: #f4f4f4; font-size: 11px; color: #555; font-weight: bold; }
tr:nth-child(even) td { background: #fafafa; }
tr.total td { font-weight: bold; background: #eef2ff; }

.step { font-size: 12px; color: #444; margin-top: 7px; line-height: 1.6; }
.small { font-size: 11px; color: #888; margin-top: 5px; line-height: 1.5; }

.occ-block { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }
.occ-block:first-of-type { border-top: none; padding-top: 4px; margin-top: 4px; }
.occ-title { font-size: 13px; font-weight: bold; color: #1d4ed8; margin-bottom: 4px; }
</style>
</head>
<body>

<h2>⚡ EB Bill Split</h2>

<div class="card">
  <label>Occupant 1 Units</label>
  <input type="number" id="o1" placeholder="Enter units" inputmode="decimal">

  <label>Occupant 2 Units</label>
  <input type="number" id="o2" placeholder="Enter units" inputmode="decimal">

  <label>Occupant 3 Units</label>
  <input type="number" id="o3" placeholder="Enter units" inputmode="decimal">

  <div class="btn-row">
    <button id="calcBtn" onclick="calc()">Calculate</button>
    <button id="dlBtn" onclick="downloadPDF()">⬇ Save PDF</button>
  </div>
</div>

<div id="out"></div>

<script>
const slabs = [
  {limit:100,      rate:0},
  {limit:200,      rate:2.35},
  {limit:400,      rate:4.70},
  {limit:500,      rate:6.30},
  {limit:600,      rate:8.40},
  {limit:800,      rate:9.45},
  {limit:1000,     rate:10.50},
  {limit:Infinity, rate:11.55}
];

const f = n => (+n).toFixed(2);

// Global state for PDF
let G = {};

function calcBill(units) {
  let remaining = units, prev = 0, bill = 0, rows = [];
  for (let s of slabs) {
    let su = Math.min(remaining, s.limit - prev);
    if (su <= 0) break;
    let amt = su * s.rate;
    bill += amt;
    rows.push({ from: prev, to: s.limit, units: su, rate: s.rate, amt });
    remaining -= su;
    prev = s.limit;
  }
  return { bill, rows };
}

function tbl(headers, rows, footerRow) {
  let html = `<div class="tbl-wrap"><table>`;
  html += `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
  for (let r of rows) html += `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`;
  if (footerRow) html += `<tr class="total">${footerRow.map(c => `<td>${c}</td>`).join('')}</tr>`;
  return html + `</table></div>`;
}

function calc() {
  let u = [+o1.value||0, +o2.value||0, +o3.value||0];
  let total = u.reduce((a,b) => a+b, 0);
  if (!total) { out.innerHTML = "<div class='card'>Please enter units.</div>"; return; }

  let html = "";

  /* STEP 1 */
  html += `<div class="card">
<b>Step 1: Total Units</b>
<div class="step">${u[0]} + ${u[1]} + ${u[2]} = <b>${f(total)} units</b></div>
</div>`;

  /* STEP 2 */
  let { bill: totalBill, rows: totalRows } = calcBill(total);
  html += `<div class="card"><b>Step 2: EB Slab Calculation (Combined)</b>`;
  html += tbl(
    ['Slab', 'Units', 'Rate', 'Calc', 'Amount'],
    totalRows.map(r => [
      `${r.from+1}–${r.to===Infinity?'∞':r.to}`,
      f(r.units), r.rate, `${f(r.units)}×${r.rate}`, `Rs.${f(r.amt)}`
    ]),
    ['Total', f(total), '', '', `Rs.${f(totalBill)}`]
  );
  html += `<div class="step">Total EB Bill = <b>Rs.${f(totalBill)}</b></div></div>`;

  /* STEP 3 */
  let freeEach = 100 / 3;
  let charge = u.map(x => Math.max(0, x - freeEach));
  let totalCharge = charge.reduce((a,b) => a+b, 0);
  html += `<div class="card"><b>Step 3: Free &amp; Chargeable Units</b>`;
  html += tbl(
    ['Occ', 'Used', 'Free', 'Chargeable', 'Formula'],
    u.map((x,i) => [i+1, x, f(freeEach), f(charge[i]), `${x}-${f(freeEach)}`]),
    ['Total', f(total), f(100), f(totalCharge), '']
  );
  html += `<div class="step">Total Chargeable = ${charge.map(f).join(' + ')} = <b>${f(totalCharge)}</b></div></div>`;

  /* STEP 4 */
  let percent = charge.map(x => totalCharge ? x / totalCharge : 0);
  html += `<div class="card"><b>Step 4: Share Percentage</b>`;
  html += tbl(
    ['Occ', 'Chargeable', 'Calculation', 'Share %'],
    charge.map((c,i) => [i+1, f(c), `${f(c)} / ${f(totalCharge)}`, `${f(percent[i]*100)}%`]),
    ['Total', f(totalCharge), '', '100%']
  );
  html += `</div>`;

  /* STEP 5 */
  let amounts = [0,0,0];
  let unitsAllocated = [0,0,0];
  let occBreakdowns = [];

  html += `<div class="card"><b>Step 5: Per-Occupant Slab Breakdown</b>
<div class="small">Alloc Units = Slab Units x Share% &nbsp;·&nbsp; Amount = Alloc Units x Rate</div>`;

  for (let i = 0; i < 3; i++) {
    let p = percent[i];
    let rem = Math.max(0, total - 100);
    let prevLocal = 100;
    let occRows = [];

    for (let s of slabs) {
      if (s.rate === 0) continue;
      let su = Math.min(rem, s.limit - prevLocal);
      if (su <= 0) break;
      let alloc = su * p;
      let amt = alloc * s.rate;
      amounts[i] += amt;
      unitsAllocated[i] += alloc;
      occRows.push([
        `${prevLocal+1}-${f(prevLocal+su)}`,
        f(su),
        `${f(su)}x${f(p*100)}%`,
        `${f(alloc)}u`,
        `Rs.${s.rate}`,
        `Rs.${f(amt)}`
      ]);
      rem -= su;
      prevLocal = s.limit;
    }

    occBreakdowns.push({ rows: occRows, total: amounts[i], units: unitsAllocated[i], pct: p });

    html += `<div class="occ-block">
<div class="occ-title">Occupant ${i+1} (${f(p*100)}%)</div>`;
    html += tbl(
      ['Slab', 'Slab U', 'Calc', 'Alloc U', 'Rate', 'Amt'],
      occRows,
      ['Total', '', '', `${f(unitsAllocated[i])}u`, '', `Rs.${f(amounts[i])}`]
    );
    html += `</div>`;
  }
  html += `</div>`;

  /* STEP 6 */
  let finalAmounts = percent.map(p => p * totalBill);
  html += `<div class="card"><b>Step 6: Final Bill Split</b>`;
  html += tbl(
    ['Occ', 'Used', 'Chargeable', 'Share %', 'Amount'],
    u.map((x,i) => [i+1, x, f(charge[i]), `${f(percent[i]*100)}%`, `Rs.${f(finalAmounts[i])}`]),
    ['Total', f(total), f(totalCharge), '100%', `Rs.${f(totalBill)}`]
  );
  html += `</div>`;

  out.innerHTML = html;

  // Save state for PDF
  G = { u, total, totalBill, totalRows, freeEach, charge, totalCharge, percent, amounts, unitsAllocated, occBreakdowns, finalAmounts };
  document.getElementById('dlBtn').style.display = 'block';
}

/* ── PDF GENERATION ── */
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const PW = 210;
  const ML = 12, MR = 12;
  const CW = PW - ML - MR;
  let y = 14;

  const BLUE   = [37, 99, 235];
  const DKBLUE = [30, 64, 175];
  const GRAY   = [100, 100, 100];
  const LTGRAY = [244, 244, 244];
  const INDIGO = [238, 242, 255];
  const WHITE  = [255, 255, 255];
  const BLACK  = [30, 30, 30];

  function checkPage(needed) {
    if (y + needed > 280) { doc.addPage(); y = 14; }
  }

  function header() {
    // Title bar
    doc.setFillColor(...BLUE);
    doc.rect(0, 0, PW, 22, 'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text('EB Bill Split Report', ML, 14);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    const now = new Date().toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
    doc.text(`Generated: ${now}`, PW - MR, 14, { align: 'right' });
    y = 28;
  }

  function sectionTitle(title) {
    checkPage(12);
    doc.setFillColor(...DKBLUE);
    doc.roundedRect(ML, y, CW, 8, 1.5, 1.5, 'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(title, ML + 3, y + 5.5);
    y += 11;
  }

  function infoLine(label, value) {
    checkPage(7);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...GRAY);
    doc.text(label, ML + 2, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...BLACK);
    doc.text(String(value), ML + 42, y);
    y += 6;
  }

  function autoTable(head, body, foot) {
    checkPage(20);
    doc.autoTable({
      startY: y,
      head: [head],
      body: body,
      foot: foot ? [foot] : [],
      margin: { left: ML, right: MR },
      tableWidth: CW,
      styles: {
        fontSize: 8,
        cellPadding: 2.5,
        halign: 'center',
        textColor: BLACK,
        lineColor: [220, 220, 220],
        lineWidth: 0.2,
      },
      headStyles: {
        fillColor: [240, 244, 255],
        textColor: DKBLUE,
        fontStyle: 'bold',
        fontSize: 7.5,
      },
      footStyles: {
        fillColor: INDIGO,
        textColor: DKBLUE,
        fontStyle: 'bold',
        fontSize: 8,
      },
      alternateRowStyles: { fillColor: [250, 250, 252] },
      didDrawPage: (data) => { y = data.cursor.y + 4; }
    });
    y = doc.lastAutoTable.finalY + 5;
  }

  const { u, total, totalBill, totalRows, freeEach, charge, totalCharge, percent, amounts, unitsAllocated, occBreakdowns, finalAmounts } = G;

  // ── HEADER ──
  header();

  // ── STEP 1 ──
  sectionTitle('Step 1: Total Units');
  infoLine('Occupant 1:', `${u[0]} units`);
  infoLine('Occupant 2:', `${u[1]} units`);
  infoLine('Occupant 3:', `${u[2]} units`);
  infoLine('Total:', `${f(total)} units`);
  y += 2;

  // ── STEP 2 ──
  sectionTitle('Step 2: EB Slab Calculation (Combined)');
  autoTable(
    ['Slab', 'Units', 'Rate (Rs/u)', 'Calculation', 'Amount'],
    totalRows.map(r => [
      `${r.from+1}-${r.to===Infinity?'INF':r.to}`,
      f(r.units), r.rate,
      `${f(r.units)} x ${r.rate}`,
      `Rs.${f(r.amt)}`
    ]),
    ['Total', f(total), '', '', `Rs.${f(totalBill)}`]
  );

  // ── STEP 3 ──
  sectionTitle('Step 3: Free & Chargeable Units');
  autoTable(
    ['Occupant', 'Used', 'Free (100/3)', 'Chargeable', 'Formula'],
    u.map((x,i) => [i+1, x, f(freeEach), f(charge[i]), `${x} - ${f(freeEach)}`]),
    ['Total', f(total), f(100), f(totalCharge), '']
  );

  // ── STEP 4 ──
  sectionTitle('Step 4: Share Percentage');
  autoTable(
    ['Occupant', 'Chargeable', 'Calculation', 'Share %'],
    charge.map((c,i) => [i+1, f(c), `${f(c)} / ${f(totalCharge)}`, `${f(percent[i]*100)}%`]),
    ['Total', f(totalCharge), '', '100%']
  );

  // ── STEP 5 ──
  sectionTitle('Step 5: Per-Occupant Slab Breakdown');
  for (let i = 0; i < 3; i++) {
    checkPage(10);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...BLUE);
    doc.text(`Occupant ${i+1}  (${f(percent[i]*100)}%)`, ML + 2, y);
    y += 5;
    autoTable(
      ['Slab', 'Slab Units', 'Calculation', 'Alloc Units', 'Rate', 'Amount'],
      occBreakdowns[i].rows,
      ['Total', '', '', `${f(unitsAllocated[i])}u`, '', `Rs.${f(amounts[i])}`]
    );
  }

  // ── STEP 6 ──
  sectionTitle('Step 6: Final Bill Split');
  autoTable(
    ['Occupant', 'Units Used', 'Chargeable', 'Share %', 'Amount'],
    u.map((x,i) => [i+1, x, f(charge[i]), `${f(percent[i]*100)}%`, `Rs.${f(finalAmounts[i])}`]),
    ['Total', f(total), f(totalCharge), '100%', `Rs.${f(totalBill)}`]
  );

  // ── FOOTER on every page ──
  const pageCount = doc.internal.getNumberOfPages();
  for (let p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFontSize(7.5);
    doc.setTextColor(160, 160, 160);
    doc.setFont('helvetica', 'normal');
    doc.text(`Page ${p} of ${pageCount}`, PW/2, 291, { align: 'center' });
    doc.text('EB Bill Split Calculator', ML, 291);
  }

  doc.save('EB_Bill_Split_Report.pdf');
}
</script>
</body>
</html>
